# Spring AI Chat Application Configuration

# Application Name
spring.application.name=springai-customsystem

# Groq AI Configuration (using OpenAI client with Groq endpoint)
spring.ai.openai.api-key=${key}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2048

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.org.springframework.ai=DEBUG
logging.level.com.example.chat=DEBUG

